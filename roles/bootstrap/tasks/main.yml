---
# ============================================================
# bootstrap — prerequisites before any package installs
# ============================================================

- name: Install Rosetta 2 on Apple Silicon
  ansible.builtin.command:
    cmd: softwareupdate --install-rosetta --agree-to-license
    creates: /Library/Apple/System/Library/Receipts/com.apple.pkg.RosettaUpdateAuto.plist
  become: true
  when: ansible_facts['machine'] == 'arm64'

- name: Check Homebrew is installed
  ansible.builtin.stat:
    path: "{{ brew_bin }}/brew"
  register: brew_installed

- name: Install Homebrew
  ansible.builtin.shell: >
    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  environment:
    NONINTERACTIVE: "1"
  when: not brew_installed.stat.exists

- name: Ensure Homebrew is up to date
  ansible.builtin.command:
    cmd: "{{ brew_bin }}/brew update"
  become: false
  changed_when: false

- name: Ensure Homebrew ownership allows staff group updates
  ansible.builtin.file:
    path: "{{ brew_prefix }}"
    group: staff
    state: directory
    recurse: true
    mode: "0775"
  become: true

- name: Set HOMEBREW_NO_ANALYTICS
  community.general.osx_defaults:
    domain: com.github.Homebrew
    key: analyticsdisabled
    type: bool
    value: true
